<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catalog — Frameskipt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a class="logo" th:href="@{/games}">Frameskipt</a>

            <nav class="header-nav">
                <div sec:authorize="isAnonymous()">
                    <a class="btn btn-outline" th:href="@{/login}">Login</a>
                    <a class="btn" th:href="@{/register}">Register</a>
                </div>

                <div sec:authorize="isAuthenticated()">
                    <span class="meta header-username">
                        <a th:href="@{/profile}">
                            Logged in as <strong sec:authentication="name">username</strong>
                        </a>
                    </span>
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-outline-danger">
                            Logout
                        </button>
                    </form>
                </div>
            </nav>
        </div>
    </header>
    
    <main class="page-container">
        <h1>The Catalog</h1>
        <p class="meta">Curated entries — no backlog filler.</p>

        <div class="catalog-grid">
            <div class="game-card" th:each="game : ${games}">
                <a th:href="@{/games/{id}(id=${game.id})}">
                    <img th:src="${game.coverArtUrl}" th:alt="${game.title}">
                </a>
                <div class="game-card-body">
                    <h3>
                        <a th:href="@{/games/{id}(id=${game.id})}"
                           th:text="${game.title}">Game Title</a>
                    </h3>
                    <p class="meta" th:text="${game.releaseYear} + ' — ' + ${game.studio}">
                        2024 — Studio Name
                    </p>
                </div>
            </div>
        </div>

        <p th:if="${games.isEmpty()}" class="meta">
            No games logged yet. The catalog is waiting.
        </p>
    </main>

</body>
</html>
